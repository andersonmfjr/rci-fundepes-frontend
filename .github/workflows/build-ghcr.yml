name: Build e Push para GHCR

on:
  push:
    branches:
      - main
      - develop
      - homolog
  
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Definir tag da imagem
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "TAG=latest" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Login no GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Definir nome da imagem
        id: vars
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          TAG=$(if [ "${{ github.ref_name }}" = "main" ]; then echo "latest"; else echo "${{ github.ref_name }}"; fi)
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Validar docker-compose
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            docker compose -f docker-compose-prod.yml config
          elif [ "${{ github.ref_name }}" = "homolog" ]
            docker compose -f docker-compose-hmg.yml config
          elif [ "${{ github.ref_name }}" = "develop" ]
            docker compose -f docker-compose-dev.yml config
          fi

      - name: Build da imagem
        run: |
          docker build -f docker/Dockerfile -t ghcr.io/${{ steps.vars.outputs.repo }}:${{ steps.vars.outputs.tag }} .
 
      - name: Criar ou incrementar tag
        uses: anothrnick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch        # opções: major | minor | patch | none
          WITH_V: true               # gera tag com prefixo 'v' (ex: v1.0.0)
          RELEASE_BRANCHES: main

      - name: Push da imagem
        run: |
          docker push ghcr.io/${{ steps.vars.outputs.repo }}:${{ steps.vars.outputs.tag }}
